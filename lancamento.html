<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Painel Frota | Lançamentos</title>

    <link
        rel="stylesheet"
        href="../css/reset.css"
    >

    <link
        rel="stylesheet"
        href="../css/variables.css"
    >

    <link
        rel="stylesheet"
        href="../css/layout.css"
    >

    <link
        rel="stylesheet"
        href="../css/components.css"
    >

    <link
        rel="stylesheet"
        href="../css/lancamentos.css"
    >

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo">

            <img
                src="../assets/logo.png"
                alt="Logo"
            >

        </div>

        <h1>Lançamentos</h1>

        <nav>

            <a href="dashboard.html">Dashboard</a>

            <a href="veiculo.html">Veículos</a>

            <a href="motoristas.html">Motoristas</a>

        </nav>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- ================= FORMULÁRIO ================= -->

        <section class="card">

            <h2>Novo Lançamento</h2>

            <form id="formLancamento">

                <div class="grid">

                    <div class="campo">

                        <label>Data</label>

                        <input
                            type="date"
                            name="data"
                            required
                        >

                    </div>

                    <div class="campo">

                        <label>Hora</label>

                        <input
                            type="time"
                            name="hora"
                            required
                        >

                    </div>

                    <div class="campo">

                        <label>Motorista</label>

                        <select
                            id="motorista"
                            name="motorista"
                            required
                        ></select>

                    </div>

                    <div class="campo">

                        <label>Veículo</label>

                        <select
                            id="veiculo"
                            name="veiculo"
                            required
                        ></select>

                    </div>

                    <div class="campo">

                        <label>Passageiro</label>

                        <input
                            type="text"
                            name="passageiro"
                        >

                    </div>

                    <div class="campo">

                        <label>Setor</label>

                        <input
                            type="text"
                            name="setor"
                        >

                    </div>

                    <div class="campo campo-full">

                        <label>Motivo</label>

                        <input
                            type="text"
                            name="motivo"
                        >

                    </div>

                    <div class="campo campo-full">

                        <label>Itinerário</label>

                        <input
                            type="text"
                            name="itinerario"
                        >

                    </div>

                    <div class="campo">

                        <label>Status</label>

                        <select
                            name="status"
                        >

                            <option value="AGENDADO">Agendado</option>

                            <option value="EM ANDAMENTO">Em andamento</option>

                            <option value="CONCLUÍDO">Concluído</option>

                            <option value="CANCELADO">Cancelado</option>

                            <option value="MANUTENÇÃO">Manutenção</option>

                        </select>

                    </div>

                </div>

                <div class="acoes">

                    <button
                        type="submit"
                        id="btnSalvar"
                        class="btn btn-primary"
                    >

                        Salvar

                    </button>

                    <button
                        type="reset"
                        class="btn"
                    >

                        Limpar

                    </button>

                </div>

            </form>

        </section>

        <!-- ================= TABELA ================= -->

        <section class="card">

            <h2>Movimentações</h2>

            <div class="table-responsive">

                <table>

                    <thead>

                        <tr>

                            <th>Data</th>

                            <th>Hora</th>

                            <th>Motorista</th>

                            <th>Veículo</th>

                            <th>Passageiro</th>

                            <th>Itinerário</th>

                            <th>Status</th>

                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody id="tabelaLancamentos">

                    </tbody>

                </table>

            </div>

        </section>

    </main>

    <!-- ================= SCRIPTS ================= -->

    <script
        type="module"
        src="../js/pages/lancamentos.js"
    ></script>

</body>

</html>
