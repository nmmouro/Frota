<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        Painel Frota - Cadastro
    </title>


    <!-- ================= CSS ================= -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/cadastro.css">

    <link rel="stylesheet" href="css/components.css">


</head>


<body>


<!-- ======================================================================
     HEADER
====================================================================== -->

<header class="header">


    <div class="header-logo">


        <img
            src="assets/img/logo.png"
            alt="Logo Frota"
        >


    </div>



    <div class="header-title">


        <h1>

            CADASTRO

        </h1>


    </div>



    <div class="header-info">


        <div
            id="clock"
            class="clock"
        >

        </div>



        <button
            id="btnFullscreen"
            class="btn-icon"
        >

            ⛶

        </button>


    </div>


</header>



<!-- ======================================================================
     CONTEÚDO
====================================================================== -->


<main class="page-container">



<section class="card">


    <h2>

        NOVA MOVIMENTAÇÃO

    </h2>



    <form
        id="formCadastro"
        class="form-grid"
    >



        <!-- DATA -->

        <div class="form-group">


            <label>

                Data

            </label>


            <input
                type="date"
                name="data"
                required
            >


        </div>




        <!-- HORA -->

        <div class="form-group">


            <label>

                Hora

            </label>


            <input
                type="time"
                name="hora"
                required
            >


        </div>





        <!-- MOTORISTA -->

        <div class="form-group">


            <label>

                Motorista

            </label>


            <select
                id="motorista"
                name="motorista"
                required
            >


                <option value="">

                    Selecione

                </option>


            </select>


        </div>





        <!-- VEÍCULO -->

        <div class="form-group">


            <label>

                Veículo

            </label>


            <select
                id="veiculo"
                name="veiculo"
                required
            >


                <option value="">

                    Selecione

                </option>


            </select>


        </div>






        <!-- PASSAGEIRO -->

        <div class="form-group">


            <label>

                Passageiro

            </label>


            <input
                type="text"
                name="passageiro"
            >


        </div>






        <!-- SETOR -->

        <div class="form-group">


            <label>

                Setor

            </label>


            <input
                type="text"
                name="setor"
            >


        </div>







        <!-- MOTIVO -->

        <div class="form-group">


            <label>

                Motivo

            </label>


            <input
                type="text"
                name="motivo"
            >


        </div>






        <!-- STATUS -->

        <div class="form-group">


            <label>

                Status

            </label>


            <select
                name="status"
            >


                <option>

                    AGENDADO

                </option>


                <option>

                    EM ANDAMENTO

                </option>


                <option>

                    VIAGEM

                </option>


                <option>

                    MANUTENÇÃO

                </option>


                <option>

                    CONCLUÍDO

                </option>


                <option>

                    CANCELADO

                </option>


            </select>


        </div>







        <!-- ITINERÁRIO -->

        <div class="form-group full">


            <label>

                Itinerário

            </label>


            <textarea

                name="itinerario"

                rows="3"

            ></textarea>


        </div>







        <!-- BOTÕES -->

        <div class="form-actions">


            <button

                type="submit"

                id="btnSalvar"

                class="btn-primary"

            >

                SALVAR

            </button>



            <button

                type="reset"

                class="btn-secondary"

            >

                LIMPAR

            </button>



        </div>



    </form>



</section>





<!-- ======================================================================
     ÚLTIMOS CADASTROS
====================================================================== -->


<section class="card">


    <h2>

        ÚLTIMOS LANÇAMENTOS

    </h2>




    <div class="table-container">


        <table>


            <thead>


                <tr>


                    <th>
                        Data
                    </th>


                    <th>
                        Hora
                    </th>


                    <th>
                        Motorista
                    </th>


                    <th>
                        Veículo
                    </th>


                    <th>
                        Passageiro
                    </th>


                    <th>
                        Status
                    </th>


                </tr>


            </thead>



            <tbody
                id="cadastrosData"
            >


            </tbody>



        </table>


    </div>


</section>



</main>





<!-- ======================================================================
     LOADING
====================================================================== -->


<div
    id="loading"
    class="loading-overlay"
>

</div>





<!-- ======================================================================
     JAVASCRIPT
====================================================================== -->


<script

    type="module"

    src="js/pages/cadastro.js"

></script>



</body>

</html>
