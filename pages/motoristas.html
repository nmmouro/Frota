<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        Painel Frota - Motoristas
    </title>



    <!-- ================= CSS ================= -->


    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/motoristas.css">

    <link rel="stylesheet" href="css/components.css">



</head>



<body>




<!-- ======================================================================
     HEADER
====================================================================== -->


<header class="header">


    <div class="header-logo">


        <img

            src="assets/img/logo.png"

            alt="Logo Frota"

        >


    </div>





    <div class="header-title">


        <h1>

            MOTORISTAS

        </h1>


    </div>





    <div class="header-info">


        <div

            id="clock"

            class="clock"

        >

        </div>





        <button

            id="btnFullscreen"

            class="btn-icon"

        >

            ⛶

        </button>


    </div>



</header>






<!-- ======================================================================
     CONTEÚDO
====================================================================== -->


<main class="page-container">






<!-- ======================================================================
     FORMULÁRIO
====================================================================== -->


<section class="card">


    <h2>

        CADASTRO DE MOTORISTA

    </h2>




    <form

        id="formMotorista"

        class="form-grid"

    >




        <!-- NOME -->


        <div class="form-group">


            <label>

                Nome

            </label>


            <input

                type="text"

                name="nome"

                required

            >


        </div>





        <!-- MATRÍCULA -->


        <div class="form-group">


            <label>

                Matrícula

            </label>


            <input

                type="text"

                name="matricula"

                required

            >


        </div>





        <!-- TELEFONE -->


        <div class="form-group">


            <label>

                Telefone

            </label>


            <input

                type="tel"

                name="telefone"

            >


        </div>






        <!-- CATEGORIA -->


        <div class="form-group">


            <label>

                Categoria CNH

            </label>


            <select

                name="categoria"

            >


                <option>

                    A

                </option>


                <option>

                    B

                </option>


                <option>

                    C

                </option>


                <option>

                    D

                </option>


                <option>

                    E

                </option>



            </select>


        </div>








        <!-- VALIDADE -->


        <div class="form-group">


            <label>

                Validade CNH

            </label>


            <input

                type="date"

                name="validade"

            >


        </div>








        <!-- STATUS -->


        <div class="form-group">


            <label>

                Status

            </label>


            <select

                name="status"

            >


                <option>

                    LIVRE

                </option>


                <option>

                    OCUPADO

                </option>


                <option>

                    FÉRIAS

                </option>


                <option>

                    AFASTADO

                </option>


                <option>

                    INATIVO

                </option>



            </select>


        </div>







        <!-- BOTÕES -->


        <div class="form-actions">


            <button

                type="submit"

                id="btnSalvar"

                class="btn-primary"

            >

                SALVAR

            </button>





            <button

                type="reset"

                class="btn-secondary"

            >

                LIMPAR

            </button>




        </div>




    </form>



</section>









<!-- ======================================================================
     LISTAGEM
====================================================================== -->


<section class="card">


    <h2>

        MOTORISTAS CADASTRADOS

    </h2>





    <div class="table-container">



        <table>




            <thead>


                <tr>


                    <th>

                        Nome

                    </th>



                    <th>

                        Matrícula

                    </th>



                    <th>

                        Telefone

                    </th>



                    <th>

                        Categoria

                    </th>



                    <th>

                        Validade CNH

                    </th>



                    <th>

                        Status

                    </th>



                </tr>


            </thead>







            <tbody

                id="tabelaMotoristas"

            >


            </tbody>






        </table>



    </div>



</section>






</main>







<!-- ======================================================================
     LOADING
====================================================================== -->


<div

    id="loading"

    class="loading-overlay"

>

</div>







<!-- ======================================================================
     JAVASCRIPT
====================================================================== -->


<script

    type="module"

    src="js/pages/motoristas.js"

></script>






</body>

</html>
