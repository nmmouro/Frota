<!doctype html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Painel Frota</title>

    <!-- CSS Global -->
    <link
        rel="stylesheet"
        href="./css/style.css">

    <!-- CSS Dashboard -->
    <link
        rel="stylesheet"
        href="./css/dashboard.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="page-header">

    <div class="header-left">

        <img
            src="./assets/img/logo.png"
            alt="Logo"
            class="logo">

        <h1>

            Painel Frota

        </h1>

    </div>

    <div class="header-center">

        <span id="clock"></span>

    </div>

    <div class="header-right">

        <button
            id="btnSom">

            🔊 Som

        </button>

        <button
            id="btnFullscreen">

            ⛶ Tela Cheia

        </button>

        <button
            onclick="location.href='lancamentos.html'">

            📋 Lançamentos

        </button>

        <button
            onclick="location.href='cadastro.html'">

            ➕ Novo

        </button>

    </div>

</header>

<!-- ================= MAIN ================= -->

<main
    id="dashboard">

    <!-- ================= RESUMO ================= -->

    <section
        class="resumo-grid">

        <div
            class="card">

            <h2>

                Veículos

            </h2>

            <div id="veiculos"></div>

        </div>

        <div
            class="card">

            <h2>

                Motoristas

            </h2>

            <div id="motoristas"></div>

        </div>

    </section>

    <!-- ================= PAINEL ================= -->

    <section
        class="card">

        <h2>

            Painel

        </h2>

        <div id="painel"></div>

    </section>

    <!-- ================= AGENDA ================= -->

    <section
        class="card">

        <h2>

            Agenda do Dia

        </h2>

        <div id="agenda"></div>

    </section>

    <!-- ================= SOCIAL ================= -->

    <section
        class="card">

        <h2>

            Agenda Serviço Social

        </h2>

        <div id="social"></div>

    </section>

</main>

<!-- ================= AUDIO ================= -->

<audio
    id="beep"
    preload="auto">

    <source
        src="./assets/audio/alerta.mp3"
        type="audio/mpeg">

</audio>

<!-- ================= JAVASCRIPT ================= -->

<script
    type="module"
    src="./js/pages/dashboard.js">
</script>

</body>

</html>
