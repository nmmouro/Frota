<!DOCTYPE html>

<html lang="pt-BR">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>

Painel Frota - Cadastro

</title>



<!-- =====================================================================
CSS
===================================================================== -->


<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/components.css">

<link rel="stylesheet" href="css/cadastro.css">



</head>



<body>



<!-- =====================================================================
HEADER
===================================================================== -->


<header class="header">


<div class="header-logo">


<img

src="assets/img/logo.png"

alt="Logo Frota"

>


</div>





<div class="header-title">


<h1>

CADASTRO

</h1>


</div>





<div class="header-info">


<div

id="clock"

class="clock">

</div>




<button

id="btnFullscreen"

class="btn-icon"

aria-label="Tela cheia">

⛶

</button>



</div>


</header>









<!-- =====================================================================
MAIN
===================================================================== -->


<main class="page-container">







<!-- =====================================================================
FORMULÁRIO
===================================================================== -->


<section class="card">


<h2>

NOVA MOVIMENTAÇÃO

</h2>





<form

id="formCadastro"

class="form-grid"

>







<!-- DATA -->


<div class="form-group">


<label>

Data

</label>


<input

type="date"

id="data"

name="data"

required

>


</div>








<!-- HORA -->


<div class="form-group">


<label>

Hora

</label>


<input

type="time"

id="hora"

name="hora"

required

>


</div>








<!-- MOTORISTA -->


<div class="form-group">


<label>

Motorista

</label>


<select

id="motorista"

name="motorista"

required

>


<option value="">

Selecione o motorista

</option>


</select>


</div>









<!-- VEÍCULO -->


<div class="form-group">


<label>

Veículo

</label>


<select

id="veiculo"

name="veiculo"

required

>


<option value="">

Selecione o veículo

</option>


</select>


</div>








<!-- PASSAGEIRO -->


<div class="form-group">


<label>

Passageiro

</label>


<input

type="text"

id="passageiro"

name="passageiro"

>


</div>









<!-- SETOR -->


<div class="form-group">


<label>

Setor

</label>


<input

type="text"

id="setor"

name="setor"

>


</div>









<!-- MOTIVO -->


<div class="form-group">


<label>

Motivo

</label>


<input

type="text"

id="motivo"

name="motivo"

>


</div>








<!-- STATUS -->


<div class="form-group">


<label>

Status

</label>


<select

id="status"

name="status"

>


<option value="AGENDADO">

AGENDADO

</option>


<option value="EM ANDAMENTO">

EM ANDAMENTO

</option>


<option value="VIAGEM">

VIAGEM

</option>


<option value="MANUTENÇÃO">

MANUTENÇÃO

</option>


<option value="CONCLUÍDO">

CONCLUÍDO

</option>


<option value="CANCELADO">

CANCELADO

</option>



</select>


</div>









<!-- ITINERÁRIO -->


<div class="form-group full">


<label>

Itinerário

</label>



<textarea

id="itinerario"

name="itinerario"

rows="3"

></textarea>



</div>









<!-- AÇÕES -->


<div class="form-actions">


<button

type="submit"

id="btnSalvar"

class="btn-primary"

>

SALVAR

</button>





<button

type="button"

id="btnNovo"

class="btn-secondary"

>

NOVO

</button>





<button

type="reset"

class="btn-secondary"

>

LIMPAR

</button>



</div>





</form>



</section>









<!-- =====================================================================
TABELA
===================================================================== -->


<section class="card">


<h2>

ÚLTIMOS LANÇAMENTOS

</h2>





<div class="table-container">


<div

id="tabelaCadastro"

></div>



</div>



</section>







</main>









<!-- =====================================================================
LOADING
===================================================================== -->


<div

id="loading"

class="loading-overlay"

hidden>

</div>









<!-- =====================================================================
SCRIPT
===================================================================== -->


<script

type="module"

src="js/pages/cadastro.js">

</script>





</body>


</html>
