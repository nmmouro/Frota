<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel Frota</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">

  
  
</head>

<body>

<form id="formLancamento" class="form-grid">

  <!-- Data e Hora -->
  <div class="grupo">
    <label>Data</label>
    <input type="date" id="data" required>
  </div>

  <div class="grupo">
    <label>Hora</label>
    <input type="time" id="hora" required>
  </div>

  <!-- Empregado -->
  <div class="grupo col-2">
    <label>empregadoMatrícula</label>
    <select id="empregadoMatricula">
      <option value="CACIO">CACIO</option>
      <option value="CELSO">CELSO</option>
      <option value="NEI">NEI</option>
    </select>
  </div>

  <!-- Veículo -->
  <div class="grupo">
    <label>Veículo</label>
    <select id="veiculo" required>
      <option value="">Selecione</option>
      <option value="TXJ6F18">TXJ6F18</option>
      <option value="TXJ6F19">TXJ6F19</option>
      <option value="TXJ6F20">TXJ6F20</option>
      <option value="TXN1I89">TXN1I89</option>
      
    </select>
  </div>

  <!-- Status -->
  <div class="grupo">
    <label>Status</label>
    <select id="status">
      <option value="EM ANDAMENTO">EM ANDAMENTO</option>
      <option value="CONCLUÍDO">CONCLUÍDO</option>
      <option value="CANCELADO">CANCELADO</option>
    </select>
  </div>

  <!-- Passageiro -->
  <div class="grupo col-2">
    <label>Passageiro / Setor / Motivo</label>
    <textarea
      id="passageiroMotivo"
      rows="2">
    </textarea>
  </div>

  <!-- Itinerário -->
  <div class="grupo col-2">
    <label>Itinerário</label>
    <textarea
      id="itinerario"
      rows="2">
    </textarea>
  </div>

  <!-- Checklist -->
  <div class="grupo">
    <label>Checklist</label>
    <select id="checklist">
      <option value="SIM">SIM</option>
      <option value="NÃO">NÃO</option>
    </select>
  </div>

  <!-- Avaliação -->
  <div class="grupo">
    <label>Avaliação Visual</label>
    <select id="avaliacaoVisual">
      <option value="BOA">BOA</option>
      <option value="REGULAR">REGULAR</option>
      <option value="RUIM">RUIM</option>
    </select>
  </div>

  <!-- Avarias -->
  <div class="grupo">
    <label>Registro de Avarias</label>
    <select id="registroAvarias">
      <option value="NÃO">NÃO</option>
      <option value="SIM">SIM</option>
    </select>
  </div>

  <div class="grupo col-2">
    <label>Avarias Registradas</label>
    <textarea
      id="avariasRegistradas"
      rows="3">
    </textarea>
  </div>

  <!-- Início -->
  <div class="grupo">
    <label>Horário Inicial</label>
    <input type="time" id="horaInicial">
  </div>

  <div class="grupo">
    <label>Km Inicial</label>
    <input
      type="number"
      id="kmInicial"
      min="0">
  </div>

  <!-- Final -->
  <div class="grupo">
    <label>Horário Final</label>
    <input type="time" id="horaFinal">
  </div>

  <div class="grupo">
    <label>Km Final</label>
    <input
      type="number"
      id="kmFinal"
      min="0">
  </div>

  <!-- Combustível -->
  <div class="grupo">
    <label>Combustivel</label>
    <select id="Combustivel">
      <option value="CHEIO">CHEIO</option>
      <option value="3/4">3/4</option>
      <option value="1/2">1/2</option>
      <option value="1/4">1/4</option>
      <option value="RESERVA">RESERVA</option>
      
    </select>
  </div>

  <!-- Média -->
  <div class="grupo">
    <label>Média Consumo (km/l)</label>
    <input
      type="text"
      id="mediaConsumo"
      readonly>
  </div>

  <!-- Distância -->
  <div class="grupo">
    <label>Distância Percorrida</label>
    <input
      type="text"
      id="distancia"
      readonly>
  </div>

  <!-- Duração -->
  <div class="grupo">
    <label>Duração Atendimento</label>
    <input
      type="text"
      id="duracao"
      readonly>
  </div>

  <!-- Lava Car -->
  <div class="grupo">
    <label>Lava-Car</label>
    <select id="lavaCar">
      <option value="NÃO">NÃO</option>
      <option value="SIM">SIM</option>
    </select>
  </div>

  <div class="grupo">
    <label>Valor Higienização</label>
    <input
      type="number"
      step="0.01"
      id="valorHigienizacao">
  </div>

  <!-- Notas -->
  <div class="grupo">
    <label>Notas de Abastecimento</label>
    <input
      type="file"
      id="notaAbastecimento"
      accept=".pdf,.jpg,.jpeg,.png">
  </div>

  <div class="grupo">
    <label>Notas de Manutenção</label>
    <input
      type="file"
      id="notaManutencao"
      accept=".pdf,.jpg,.jpeg,.png">
  </div>

  <!-- Botões -->
  <div class="acoes col-2">

    <button
      type="submit"
      class="btn-salvar">
        Salvar
    </button>

    <button
      type="reset"
      class="btn-cancelar">
        Limpar
    </button>

  </div>
  

</form>


<script src="js/config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
