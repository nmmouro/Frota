<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        Painel Frota - Lançamentos
    </title>


    <!-- ================= CSS ================= -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/lancamentos.css">

    <link rel="stylesheet" href="css/components.css">


</head>


<body>


<!-- ======================================================================
     HEADER
====================================================================== -->

<header class="header">


    <div class="header-logo">

        <img 
            src="assets/img/logo.png"
            alt="Logo Frota"
        >

    </div>


    <div class="header-title">

        <h1>

            LANÇAMENTOS

        </h1>

    </div>



    <div class="header-info">


        <div 
            id="clock"
            class="clock"
        >

        </div>


        <button 
            id="btnFullscreen"
            class="btn-icon"
        >

            ⛶

        </button>


    </div>


</header>



<!-- ======================================================================
     MAIN
====================================================================== -->


<main class="page-container">



<!-- ======================================================================
     FORMULÁRIO
====================================================================== -->


<section class="card">


    <h2>

        NOVO LANÇAMENTO

    </h2>



    <form 
        id="formLancamento"
        class="form-grid"
    >


        <div class="form-group">

            <label>
                Data
            </label>

            <input
                type="date"
                name="data"
                required
            >

        </div>



        <div class="form-group">

            <label>
                Hora
            </label>

            <input
                type="time"
                name="hora"
                required
            >

        </div>



        <div class="form-group">

            <label>
                Motorista
            </label>


            <select
                id="motorista"
                name="motorista"
                required
            >

                <option>
                    Selecione
                </option>

            </select>


        </div>




        <div class="form-group">


            <label>
                Veículo
            </label>


            <select
                id="veiculo"
                name="veiculo"
                required
            >

                <option>
                    Selecione
                </option>

            </select>


        </div>




        <div class="form-group">


            <label>
                Passageiro
            </label>


            <input
                type="text"
                name="passageiro"
            >


        </div>




        <div class="form-group">


            <label>
                Setor
            </label>


            <input
                type="text"
                name="setor"
            >


        </div>




        <div class="form-group">


            <label>
                Motivo
            </label>


            <input
                type="text"
                name="motivo"
            >


        </div>





        <div class="form-group">


            <label>
                Status
            </label>


            <select
                name="status"
            >

                <option>
                    AGENDADO
                </option>

                <option>
                    EM ANDAMENTO
                </option>

                <option>
                    VIAGEM
                </option>

                <option>
                    MANUTENÇÃO
                </option>


            </select>


        </div>




        <div class="form-group full">


            <label>
                Itinerário
            </label>


            <input
                type="text"
                name="itinerario"
            >


        </div>




        <div class="form-actions">


            <button
                type="submit"
                id="btnSalvar"
                class="btn-primary"
            >

                SALVAR

            </button>



            <button
                type="reset"
                class="btn-secondary"
            >

                LIMPAR

            </button>


        </div>



    </form>



</section>





<!-- ======================================================================
     TABELA DE LANÇAMENTOS
====================================================================== -->


<section class="card">


    <h2>

        LANÇAMENTOS REALIZADOS

    </h2>



    <div class="table-container">

    
    <div id="tabelaLancamentos"></div>

</div>


</section>



</main>




<!-- ======================================================================
     LOADING
====================================================================== -->

<div 
    id="loading"
    class="loading-overlay"
>

</div>




<!-- ======================================================================
     JAVASCRIPT
====================================================================== -->

<script 
    type="module"
    src="js/pages/lancamentos.js"
></script>



</body>

</html>
