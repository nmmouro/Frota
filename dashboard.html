<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Frota - Dashboard</title>


    <!-- ================= CSS ================= -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet" href="css/components.css">


</head>


<body>


<!-- ======================================================================
     HEADER
====================================================================== -->

<header class="header">


    <div class="header-logo">

        <img 
            src="assets/img/logo.png"
            alt="Logo Frota"
        >

    </div>


    <div class="header-title">

        <h1>

            MOVIMENTAÇÃO DIÁRIA

        </h1>

    </div>


    <div class="header-info">


        <div 
            id="clock"
            class="clock"
        >

        </div>


        <button 
            id="btnAudio"
            class="btn-icon"
        >

            🔊

        </button>


        <button 
            id="btnFullscreen"
            class="btn-icon"
        >

            ⛶

        </button>


    </div>


</header>



<!-- ======================================================================
     MAIN
====================================================================== -->


<main class="dashboard">


<!-- ================= RESUMO ================= -->


<section class="resumo-grid">


    <div class="card">

        <h2>

            VEÍCULOS

        </h2>


        <div 
            id="veiculosData"
            class="cards-container"
        >

        </div>


    </div>



    <div class="card">

        <h2>

            MOTORISTAS

        </h2>


        <div 
            id="motoristasData"
            class="cards-container"
        >

        </div>


    </div>


</section>



<!-- ================= PAINEL ================= -->


<section class="card painel-card">


    <h2>

        PAINEL

    </h2>


    <div class="table-container">


        <table>


            <thead>


                <tr>

                    <th>Data</th>

                    <th>Hora</th>

                    <th>Motorista</th>

                    <th>Veículo</th>

                    <th>Passageiro / Setor</th>

                    <th>Itinerário</th>

                    <th>Status</th>


                </tr>


            </thead>


            <tbody 
                id="painelData"
            >

            </tbody>


        </table>


    </div>


</section>



<!-- ================= AGENDA ================= -->


<section class="grid-agendas">


    <div class="card">


        <h2>

            AGENDA DO DIA

        </h2>


        <div class="table-container">


            <table>


                <thead>


                    <tr>

                        <th>Hora</th>

                        <th>Passageiro</th>

                        <th>Setor</th>

                        <th>Motivo</th>

                        <th>Itinerário</th>

                        <th>Status</th>


                    </tr>


                </thead>


                <tbody 
                    id="agendaData"
                >

                </tbody>


            </table>


        </div>


    </div>




    <div class="card">


        <h2>

            AGENDA SERVIÇO SOCIAL

        </h2>


        <div class="table-container">


            <table>


                <thead>


                    <tr>


                        <th>Período</th>

                        <th>Passageiro</th>

                        <th>Motivo</th>

                        <th>Itinerário</th>

                        <th>Status</th>


                    </tr>


                </thead>


                <tbody 
                    id="socialData"
                >

                </tbody>


            </table>


        </div>


    </div>



</section>


</main>



<!-- ======================================================================
     LOADING
====================================================================== -->


<div 
    id="loading"
    class="loading-overlay"
>

</div>



<!-- ======================================================================
     JAVASCRIPT
====================================================================== -->


<script 
    type="module"
    src="js/pages/dashboard.js"
></script>



</body>

</html>
